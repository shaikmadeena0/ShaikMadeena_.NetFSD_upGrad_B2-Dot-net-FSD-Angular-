<!doctype html>
<html>
  <head>
    <title>Location-Based Weather Logger</title>
  </head>
  <body onload="loadLocationHistory()">
    <h2> Location Logger</h2>

    <button onclick="getLocation()">Get My Location</button>

    <p id="currentLocation"></p>

    <h3> Last 5 Locations:</h3>
    <ul id="locationHistory"></ul>

    <script>
     
      function getLocation() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(showPosition, showError, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0,
          });
        } else {
          alert("Geolocation is not supported by this browser.");
        }
      }
      function showPosition(position) {
        let lat = position.coords.latitude;
        let lon = position.coords.longitude;

        document.getElementById("currentLocation").innerText =
          `Latitude: ${lat}, Longitude: ${lon}`;

        saveLocation({
          latitude: lat,
          longitude: lon,
          timestamp: new Date().toLocaleString(),
        });
      }
      function showError(error) {
        let message = "";
        switch (error.code) {
          case error.PERMISSION_DENIED:
            message = "User denied the request for Geolocation.";
            break;
          case error.POSITION_UNAVAILABLE:
            message = "Location information is unavailable.";
            break;
          case error.TIMEOUT:
            message = "The request to get user location timed out.";
            break;
          default:
            message = "An unknown error occurred.";
        }
        document.getElementById("currentLocation").innerText = message;
      }
      function saveLocation(locationObj) {
        let history = localStorage.getItem("locationHistory");
        let locations = history ? JSON.parse(history) : [];

        locations.unshift(locationObj); 
         if (locations.length > 5) {
          locations.pop(); 
        }
        localStorage.setItem("locationHistory", JSON.stringify(locations));
        displayHistory();
      }
      function displayHistory() {
        let history = localStorage.getItem("locationHistory");
        let locations = history ? JSON.parse(history) : [];

        let list = document.getElementById("locationHistory");
        list.innerHTML = "";

        locations.forEach((loc, index) => {
          let li = document.createElement("li");
          li.innerText = `${loc.timestamp}: Latitude ${loc.latitude}, Longitude ${loc.longitude}`;
          list.appendChild(li);
        });
      }

      function loadLocationHistory() {
        displayHistory();
      }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Mini Expense Tracker</title>
</head>
<body onload="initDB()">

<h2> Mini Expense Tracker</h2>

<!-- Expense Form -->
<label>Title:</label>
<input type="text" id="title" placeholder="Expense title"><br><br>

<label>Amount:</label>
<input type="number" id="amount" placeholder="Amount"><br><br>

<label>Date:</label>
<input type="date" id="date"><br><br>

<button onclick="addExpense()">Add Expense</button>
<button onclick="viewExpenses()">View Expenses</button>

<h3>📋 Expense List</h3>
<table border="1" id="expenseTable">
    <tr>
        <th>Title</th>
        <th>Amount</th>
        <th>Date</th>
        <th>Action</th>
    </tr>
</table>

<script>
let db;

// Initialize Web SQL DB
function initDB() {
    if (!window.openDatabase) {
        alert("Web SQL is not supported by this browser.");
        return;
    }

    // Open database: name, version, display name, size
    db = openDatabase("ExpenseDB", "1.0", "Mini Expense Tracker DB", 2 * 1024 * 1024);

    // Create table if not exists
    db.transaction(function(tx) {
        tx.executeSql(`CREATE TABLE IF NOT EXISTS expenses (
            id INTEGER PRIMARY KEY,
            title TEXT,
            amount REAL,
            date TEXT
        )`, [], 
        function() { console.log("Table created/already exists"); },
        function(tx, error) { console.error("Error creating table:", error.message); });
    });
}

// Add expense
function addExpense() {
    let title = document.getElementById("title").value;
    let amount = document.getElementById("amount").value;
    let date = document.getElementById("date").value;

    if (!title || !amount || !date) {
        alert("Please fill all fields!");
        return;
    }

    db.transaction(function(tx) {
        tx.executeSql("INSERT INTO expenses (title, amount, date) VALUES (?, ?, ?)", 
            [title, amount, date],
            function(tx, result) {
                alert("Expense added successfully!");
                viewExpenses(); // refresh list
            },
            function(tx, error) {
                console.error("Error inserting expense:", error.message);
            });
    });

    // Clear input fields
    document.getElementById("title").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("date").value = "";
}

// View all expenses
function viewExpenses() {
    db.transaction(function(tx) {
        tx.executeSql("SELECT * FROM expenses ORDER BY date DESC", [], function(tx, results) {
            let table = document.getElementById("expenseTable");
            table.innerHTML = `<tr>
                <th>Title</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Action</th>
            </tr>`; // reset table

            for (let i = 0; i < results.rows.length; i++) {
                let row = results.rows.item(i);
                let tr = document.createElement("tr");
                tr.innerHTML = `<td>${row.title}</td>
                                <td>${row.amount}</td>
                                <td>${row.date}</td>
                                <td><button onclick="deleteExpense(${row.id})">Delete</button></td>`;
                table.appendChild(tr);
            }
        }, function(tx, error) {
            console.error("Error fetching expenses:", error.message);
        });
    });
}

// Delete expense by ID
function deleteExpense(id) {
    db.transaction(function(tx) {
        tx.executeSql("DELETE FROM expenses WHERE id=?", [id],
            function(tx, result) {
                alert("Expense deleted successfully!");
                viewExpenses();
            },
            function(tx, error) {
                console.error("Error deleting expense:", error.message);
            });
    });
}

</script>

</body>
</html>

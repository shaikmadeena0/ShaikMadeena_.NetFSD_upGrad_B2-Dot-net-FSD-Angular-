<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Electronics Store</title>

    <!-- Bootstrap 5 CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">ElectroShop</a>
      </div>
    </nav>

    <!-- ================= PRODUCT SECTION ================= -->
    <section class="py-5">
      <div class="container">
        <h2 class="text-center mb-5 fw-bold">Our Products</h2>

        <!-- Grid Row -->
        <div class="row g-4">
          <!-- Product 1 -->
          <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
              <img
                src="https://via.placeholder.com/300x200"
                class="card-img-top"
                alt="Product"
              />
              <div class="card-body d-flex flex-column">
                <h5 class="card-title">Smartphone</h5>
                <p class="card-text">
                  Latest 5G smartphone with high performance.
                </p>
                <h6 class="text-primary mb-3">$699</h6>
                <div class="mt-auto">
                  <button class="btn btn-primary w-100 mb-2">
                    Add to Cart
                  </button>
                  <button class="btn btn-outline-secondary w-100">
                    View Details
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Product 2 -->
          <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
              <img
                src="https://via.placeholder.com/300x200"
                class="card-img-top"
                alt="Product"
              />
              <div class="card-body d-flex flex-column">
                <h5 class="card-title">Laptop</h5>
                <p class="card-text">Powerful laptop for work and gaming.</p>
                <h6 class="text-primary mb-3">$999</h6>
                <div class="mt-auto">
                  <button class="btn btn-primary w-100 mb-2">
                    Add to Cart
                  </button>
                  <button class="btn btn-outline-secondary w-100">
                    View Details
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Product 3 -->
          <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
              <img
                src="https://via.placeholder.com/300x200"
                class="card-img-top"
                alt="Product"
              />
              <div class="card-body d-flex flex-column">
                <h5 class="card-title">Headphones</h5>
                <p class="card-text">Noise-cancelling wireless headphones.</p>
                <h6 class="text-primary mb-3">$199</h6>
                <div class="mt-auto">
                  <button class="btn btn-primary w-100 mb-2">
                    Add to Cart
                  </button>
                  <button class="btn btn-outline-secondary w-100">
                    View Details
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Product 4 -->
          <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm">
              <img
                src="https://via.placeholder.com/300x200"
                class="card-img-top"
                alt="Product"
              />
              <div class="card-body d-flex flex-column">
                <h5 class="card-title">Smart Watch</h5>
                <p class="card-text">Track fitness and notifications easily.</p>
                <h6 class="text-primary mb-3">$249</h6>
                <div class="mt-auto">
                  <button class="btn btn-primary w-100 mb-2">
                    Add to Cart
                  </button>
                  <button class="btn btn-outline-secondary w-100">
                    View Details
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

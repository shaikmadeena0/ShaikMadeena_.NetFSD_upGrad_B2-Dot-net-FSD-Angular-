<!doctype html>
<html>
  <head>
    <title>Student Profile Manager</title>
    <style>
      #studentCard {
        width: 300px;
        padding: 15px;
        border: 2px solid #333;
        border-radius: 8px;
        background-color: #f4f4f4;
        font-family: Arial, sans-serif;
      }

      button {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h2>Student Profile</h2>
    <div id="studentCard"></div>
    <br />
    <input type="number" id="newMarks" placeholder="Enter new marks" />
    <button id="updateBtn">Update Marks</button>
    <script>
      var student = {
        name: "Rahul",
        rollNo: 101,
        marks: 75,
      };
      function updateStudentProfile(studentObj) {
        var profileHTML =
          "<p><strong>Name:</strong> " +
          studentObj.name +
          "</p>" +
          "<p><strong>Roll No:</strong> " +
          studentObj.rollNo +
          "</p>" +
          "<p><strong>Marks:</strong> " +
          studentObj.marks +
          "</p>";

        document.getElementById("studentCard").innerHTML = profileHTML;
      }
      function updateMarks(newMarks) {
        student.marks = newMarks;
        updateStudentProfile(student);
      }
      document
        .getElementById("updateBtn")
        .addEventListener("click", function () {
          var marksValue = document.getElementById("newMarks").value;
          updateMarks(marksValue);
        });
      updateStudentProfile(student);
    </script>
  </body>
</html>
